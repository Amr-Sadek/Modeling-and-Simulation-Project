<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modeling Project</title>
    <link rel="icon" href="FlowerBackground.png">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-image: url(FlowerBackground.png);
            background-size: 35%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
        }

        .button {
            padding: 10px 20px;
            font-weight: bolder;
            font-size: 25px;
            background-color: rgb(53, 146, 232);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.5s;
        }

        .button:hover {
            background-color: brown;
            scale: 1.5;
        }

        .Header {
            margin-top: 25px;
            text-align: center;
            font-weight: bolder;
            font-size: 70px;
        }

        #Output2,
        #Output1,
        #Output3 {
            margin-top: 9%;
            background-color: white;
            overflow: auto;
            width: 50%;
            max-height: 65vh;
        }

        #Output2 table,
        #Output1 table,
        #Output3 table {
            border-collapse: collapse;
            width: 100%;
        }

        #Output2 th,
        #Output2 td,
        #Output1 th,
        #Output1 td,
        #Output3 th,
        #Output3 td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        #Output2 th,
        #Output1 th,
        #Output3 th {
            background-color: #f2f2f2;
        }

        .Output {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid rgb(0, 0, 0);
            border-radius: 5px;
            display: none;
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @media only screen and (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

    <h1>Modeling & Simulation Project</h1>

    <div class="container">
        <button class="button" id="Project1">Queueing Simulation</button>
        <button class="button" id="Project2">Inventory System</button>
        <button class="button" id="Project3">NewsPaper Seller</button>
    </div>

    <div id="Header" class="Header"></div>
    <div id="Output1" class="Output"></div>
    <div id="Output2" class="Output"></div>
    <div id="Output3" class="Output"></div>

    <script>
        document.getElementById("Project1").addEventListener("click", function () {
            document.getElementById("Output1").style.display = "block";
            document.getElementById("Output2").style.display = "none";
            document.getElementById("Output3").style.display = "none";


            let output1 = document.getElementById("Output1");

            const Simulation_Length = 20;

            class Customer {
                constructor() {
                    this.IAT = 0;
                    this.Arrival_Time = 0;
                    this.Service_Time = 0;
                    this.Service_Begin = 0;
                    this.Service_End = 0;
                    this.Waiting_Time = 0;
                    this.Time_Spent = 0;
                    this.Server_Idle = 0;
                }
            }

            class Single_Server_Simulation {
                static Simulation_Length = 0;
                static customers = [];

                static ComputeArrivalTimes() {
                    this.customers[0].Arrival_Time = this.customers[0].IAT;
                    for (let i = 1; i < this.Simulation_Length; i++) {
                        this.customers[i].Arrival_Time = this.customers[i - 1].Arrival_Time + this.customers[i].IAT;
                    }
                }

                static Print_Simulation_Table() {
                    let output = "<table><tr><th>Cust_ID</th><th>IAT</th><th>Ar</th><th>ST</th><th>SBegin</th><th>SEnd</th><th>WT</th><th>TS</th><th>Idle</th></tr>";
                    for (let i = 0; i < this.Simulation_Length; i++) {
                        const customer = this.customers[i];
                        output += `<tr><td>Cust${i + 1}</td><td>${customer.IAT}</td><td>${customer.Arrival_Time}</td><td>${customer.Service_Time}</td><td>${customer.Service_Begin}</td><td>${customer.Service_End}</td><td>${customer.Waiting_Time}</td><td>${customer.Time_Spent}</td><td>${customer.Server_Idle}</td></tr>`;
                    }
                    output += "</table>";
                    return output;
                }

                static Simulate() {
                    this.customers = new Array(this.Simulation_Length);

                    for (let i = 0; i < this.Simulation_Length; i++) {
                        this.customers[i] = new Customer();
                        this.customers[i].IAT = Math.floor(Math.random() * 10);
                        this.customers[i].Service_Time = Math.floor(Math.random() * 10);
                    }

                    this.ComputeArrivalTimes();

                    for (let i = 0; i < this.Simulation_Length; i++) {
                        if (i === 0) {
                            this.customers[i].Service_Begin = this.customers[i].Arrival_Time;
                        } else {
                            this.customers[i].Service_Begin = Math.max(this.customers[i].Arrival_Time, this.customers[i - 1].Service_End);
                        }
                        this.customers[i].Service_End = this.customers[i].Service_Begin + this.customers[i].Service_Time;
                        this.customers[i].Waiting_Time = this.customers[i].Service_Begin - this.customers[i].Arrival_Time;
                        this.customers[i].Time_Spent = this.customers[i].Waiting_Time + this.customers[i].Service_Time;
                        if (i === 0) {
                            this.customers[i].Server_Idle = this.customers[i].Arrival_Time;
                        } else {
                            this.customers[i].Server_Idle = this.customers[i].Service_Begin - this.customers[i - 1].Service_End;
                        }
                    }
                }

                static Compute_Statestics() {
                    let sumforWatitingtime = 0, sumforserveicetime = 0;
                    for (let i = 0; i < this.Simulation_Length; i++) {
                        sumforWatitingtime += this.customers[i].Waiting_Time;
                        sumforserveicetime += this.customers[i].Service_Time;
                    }
                    const average_Watitng_Time = sumforWatitingtime / this.Simulation_Length;
                    const average_service_time = sumforserveicetime / this.Simulation_Length;
                    return `The average Waiting time: ${average_Watitng_Time}<br>The average service time: ${average_service_time}`;
                }
            }

            Single_Server_Simulation.Simulation_Length = Simulation_Length;
            Single_Server_Simulation.Simulate();
            Header.innerHTML = "Queueing Simulation";
            output1.innerHTML = "";
            output1.innerHTML += Single_Server_Simulation.Print_Simulation_Table();
            output1.innerHTML += Single_Server_Simulation.Compute_Statestics();
        });
        document.getElementById("Project2").addEventListener("click", function () {
            document.getElementById("Output1").style.display = "none";
            document.getElementById("Output2").style.display = "block";
            document.getElementById("Output3").style.display = "none";

            var cycle, days, begining, quantity, shortage = 0, waiting = 0, widget = 0, Dcount = 0, prev;
            var T_F = true;

            cycle = prompt("Enter Cycle: ");
            if (cycle !== null && cycle.trim() !== "") {
                days = prompt("Enter Days: ");
                if (days !== null && days.trim() !== "") {
                    begining = prompt("Enter Begining: ");
                    if(begining !== null && begining.trim() !== "") {
                        quantity = prompt("Enter Quantity: ");
                    }
                }
            }

            var output = "<table><tr><th>Days</th><th>Inventory</th><th>Random</th><th>Demand</th><th>Ending</th><th>Shortage</th><th>Quantity</th><th>Random2</th><th>Waiting</th></tr>";

            for (var i = 1; i <= days * cycle; i++) {
                var rand, rand2;
                rand = rand2 = Math.floor(Math.random() * 99) + 1;
                prev = begining;

                if (rand > 0 && rand <= 33) {

                } else if (rand >= 34 && rand <= 58) {
                    begining -= 1;
                    widget = 1;
                } else if (rand >= 59 && rand <= 78) {
                    begining -= 2;
                    widget = 2;
                } else if (rand >= 79 && rand <= 90) {
                    begining -= 3;
                    widget = 3;
                } else {
                    begining -= 4;
                    widget = 4;
                }

                if (begining <= 0 || i % 7 === 0) {
                    if (T_F) {
                        if (rand2 > 0 && rand2 <= 30) {
                            waiting = 1;
                        } else if (rand2 >= 31 && rand2 <= 80) {
                            waiting = 2;
                        } else {
                            waiting = 3;
                        }
                        waiting += 1;
                    }
                    shortage += Math.abs(begining);
                    begining = 0;
                    T_F = false;
                    waiting -= 1;
                }

                if (waiting === -1) {
                    if (begining <= 6) {
                        begining += parseInt(quantity);
                        T_F = true;
                        waiting = 0;
                    }
                }

                output += "<tr><td>" + Dcount + "</td><td>" + prev + "</td><td>" + rand + "</td><td>" + widget + "</td><td>" + begining + "</td><td>" + shortage + "</td><td>" + quantity + "</td><td>" + rand2 + "</td><td>" + waiting + "</td></tr>";
                Dcount++;
            }

            output += "</table>";

            Header.innerHTML = "Inventory System";
            Output2.innerHTML = output;
        });
        document.getElementById("Project3").addEventListener("click", function () {
            document.getElementById("Output1").style.display = "none";
            document.getElementById("Output2").style.display = "none";
            document.getElementById("Output3").style.display = "block";

            var size = prompt("Please enter the number of days:");
            var Random_Digit_Newspaper = [];
            var types = [];
            var Random_Digits_for_Demand = [];
            var Demand = [];
            var Revenue_for_sale = [];
            var Lost_Profit_for_Excess_Demand = [];
            var Salvage_from_Sale_of_Scrap = [];
            var Daily_Profit = [];

            for (var i = 0; i < size; i++) {
                Random_Digit_Newspaper[i] = Math.floor(Math.random() * (99 - 1 + 1) + 1);

                Random_Digits_for_Demand[i] = Math.floor(Math.random() * (99 - 1 + 1) + 1);

                if (Random_Digit_Newspaper[i] >= 1 && Random_Digit_Newspaper[i] <= 35) {
                    types[i] = "Good";
                    if (Random_Digits_for_Demand[i] >= 1 && Random_Digits_for_Demand[i] <= 3) {
                        Demand[i] = 40;
                    } else if (Random_Digits_for_Demand[i] >= 4 && Random_Digits_for_Demand[i] <= 8) {
                        Demand[i] = 50;
                    } else if (Random_Digits_for_Demand[i] >= 9 && Random_Digits_for_Demand[i] <= 23) {
                        Demand[i] = 60;
                    } else if (Random_Digits_for_Demand[i] >= 24 && Random_Digits_for_Demand[i] <= 43) {
                        Demand[i] = 70;
                    } else if (Random_Digits_for_Demand[i] >= 44 && Random_Digits_for_Demand[i] <= 78) {
                        Demand[i] = 80;
                    } else if (Random_Digits_for_Demand[i] >= 79 && Random_Digits_for_Demand[i] <= 93) {
                        Demand[i] = 90;
                    } else if (Random_Digits_for_Demand[i] >= 94 && Random_Digits_for_Demand[i] <= 99) {
                        Demand[i] = 100;
                    }
                } else if (Random_Digit_Newspaper[i] >= 36 && Random_Digit_Newspaper[i] <= 80) {
                    types[i] = "Fair";
                    if (Random_Digits_for_Demand[i] >= 1 && Random_Digits_for_Demand[i] <= 10) {
                        Demand[i] = 40;
                    } else if (Random_Digits_for_Demand[i] >= 11 && Random_Digits_for_Demand[i] <= 28) {
                        Demand[i] = 50;
                    } else if (Random_Digits_for_Demand[i] >= 29 && Random_Digits_for_Demand[i] <= 68) {
                        Demand[i] = 60;
                    } else if (Random_Digits_for_Demand[i] >= 69 && Random_Digits_for_Demand[i] <= 88) {
                        Demand[i] = 70;
                    } else if (Random_Digits_for_Demand[i] >= 89 && Random_Digits_for_Demand[i] <= 96) {
                        Demand[i] = 80;
                    } else if (Random_Digits_for_Demand[i] >= 97 && Random_Digits_for_Demand[i] <= 99) {
                        Demand[i] = 90;
                    }
                } else if (Random_Digit_Newspaper[i] >= 81 && Random_Digit_Newspaper[i] <= 99) {
                    types[i] = "Poor";
                    if (Random_Digits_for_Demand[i] >= 1 && Random_Digits_for_Demand[i] <= 44) {
                        Demand[i] = 40;
                    } else if (Random_Digits_for_Demand[i] >= 45 && Random_Digits_for_Demand[i] <= 66) {
                        Demand[i] = 50;
                    } else if (Random_Digits_for_Demand[i] >= 67 && Random_Digits_for_Demand[i] <= 82) {
                        Demand[i] = 60;
                    } else if (Random_Digits_for_Demand[i] >= 83 && Random_Digits_for_Demand[i] <= 94) {
                        Demand[i] = 70;
                    } else if (Random_Digits_for_Demand[i] >= 95 && Random_Digits_for_Demand[i] <= 99) {
                        Demand[i] = 80;
                    }
                }

                Revenue_for_sale[i] = (Demand[i] * 50) / 100;

                if (Demand[i] < 70) {
                    Salvage_from_Sale_of_Scrap[i] = (70 - Demand[i]) * 0.05;
                    Lost_Profit_for_Excess_Demand[i] = 0;
                    Daily_Profit[i] = (Demand[i] * 0.17) - ((70 - Demand[i]) * 0.28);
                } else if (Demand[i] == 70) {
                    Salvage_from_Sale_of_Scrap[i] = 0;
                    Lost_Profit_for_Excess_Demand[i] = 0;
                    Daily_Profit[i] = Demand[i] * 0.17;
                } else if (Demand[i] > 70) {
                    Salvage_from_Sale_of_Scrap[i] = 0;
                    Lost_Profit_for_Excess_Demand[i] = (Demand[i] - 70) * 0.17;
                    Daily_Profit[i] = (70 * 0.17) - Lost_Profit_for_Excess_Demand[i];
                }
            }

            var output3 = document.getElementById("Output3");
            var table = "<table><tr><th>Day</th><th>Random Digit</th><th>Type Paper</th><th>Random Demand</th><th>Demand</th><th>Revenue for sale</th><th>Lost Profit Demand</th><th>Salvage Scrap</th><th>Daily Profit</th></tr>";

            for (var i = 0; i < size; i++) {
                table += "<tr><td>" + (i + 1) + "</td><td>" + Random_Digit_Newspaper[i] + "</td><td>" + types[i] + "</td><td>" + Random_Digits_for_Demand[i] + "</td><td>" + Demand[i] + "</td><td>" + Revenue_for_sale[i].toFixed(2) + "</td><td>" + Lost_Profit_for_Excess_Demand[i].toFixed(2) + "</td><td>" + Salvage_from_Sale_of_Scrap[i].toFixed(2) + "</td><td>" + Daily_Profit[i].toFixed(2) + "</td></tr>";
            }

            table += "</table>";

            Header.innerHTML = "NewsPaper Seller";
            output3.innerHTML = table;
        });
    </script>
</body>

</html>
